    <!-- Noscript fallback with rich content for search engine crawlers -->
    <noscript>
      <div style="max-width:900px;margin:0 auto;padding:40px 20px;font-family:sans-serif;color:#e0e0e0;background:#0a0a0a;">
        <header>
          <h1>SceneBurn — Track, Rate & Discover Movies and TV Shows You Love</h1>
          <p>Your personal movie and TV show tracker. Rate films, build watchlists, discover new favourites, write reviews, and connect with fellow cinephiles.</p>
        </header>

        <main>
          <section>
            <h2>Browse Movies</h2>
            <p>Explore thousands of movies — from box-office hits to hidden gems. Filter by popularity, now playing in cinemas, upcoming releases, and top-rated films of all time. Track what you've watched and rate every film on a 5-star scale.</p>
            <p><a href="https://sceneburn.com/movies">Browse all movies on SceneBurn</a></p>
          </section>

          <section>
            <h2>Browse TV Shows</h2>
            <p>Discover popular TV series, shows airing today, currently on-air seasons, and the highest-rated shows ever. Log episodes, track your progress season by season, and never lose your place again.</p>
            <p><a href="https://sceneburn.com/tv-shows">Browse all TV shows on SceneBurn</a></p>
          </section>

          <section>
            <h2>Explore by Genre</h2>
            <p>Find movies and TV shows across every genre — action, comedy, drama, horror, sci-fi, thriller, animation, documentary, romance, and more. Dive deep into the categories you love.</p>
            <p><a href="https://sceneburn.com/genres">Explore genres on SceneBurn</a></p>
          </section>

          <section>
            <h2>Entertainment News</h2>
            <p>Stay up to date with the latest entertainment news — new releases, casting announcements, trailer drops, awards coverage, and industry updates curated daily.</p>
            <p><a href="https://sceneburn.com/news">Read entertainment news on SceneBurn</a></p>
          </section>

          <section>
            <h2>Blog & Articles</h2>
            <p>Read in-depth articles, film analysis, top-ten lists, retrospectives, and opinion pieces from the SceneBurn community and editorial team.</p>
            <p><a href="https://sceneburn.com/blog">Read the SceneBurn blog</a></p>
          </section>

          <section>
            <h2>User Lists & Watchlists</h2>
            <p>Create and share curated movie lists — best horror films, must-watch dramas, weekend binge suggestions, and more. Build your personal watchlist and organise films into custom collections.</p>
            <p><a href="https://sceneburn.com/lists">Browse user lists on SceneBurn</a></p>
          </section>

          <section>
            <h2>Community & Members</h2>
            <p>Join a growing community of film and TV enthusiasts. Follow other members, see what they're watching, read their reviews, and discover films through people with similar taste.</p>
            <p><a href="https://sceneburn.com/members">Browse community members on SceneBurn</a></p>
          </section>

          <section>
            <h2>Search</h2>
            <p>Search for any movie, TV show, or person across our entire catalogue powered by TMDB. Find exactly what you're looking for in seconds.</p>
            <p><a href="https://sceneburn.com/search">Search on SceneBurn</a></p>
          </section>

          <section>
            <h2>SceneBurn Pro</h2>
            <p>Upgrade to SceneBurn Pro for advanced stats, taste insights, custom themes, priority support, and an ad-free experience.</p>
            <p><a href="https://sceneburn.com/pro">Learn about SceneBurn Pro</a></p>
